<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPSC Cumulative Question Segregator</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; max-width: 650px; margin: 40px auto; padding: 20px; background-color: #f3f4f6; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { color: #1e3a8a; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; }
        input[type="text"] { width: 95%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 15px; }
        .btn { background: #1e40af; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; margin-top: 10px; }
        .btn:hover { background: #1d4ed8; }
        .upload-box { border: 3px dashed #2563eb; padding: 40px; text-align: center; border-radius: 8px; background: #eff6ff; cursor: pointer; margin-top: 20px; }
        .status { margin-top: 20px; padding: 15px; border-radius: 6px; font-weight: bold; display: none; }
        .info { background: #e0f2fe; color: #0369a1; }
        .success { background: #dcfce7; color: #15803d; }
        .error { background: #fee2e2; color: #b91c1c; }
        .logout-btn { background: #dc2626; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; float: right; margin-top: -5px; }
        .logout-btn:hover { background: #b91c1c; }
        .user-meta { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e5e7eb; padding-bottom: 10px; margin-bottom: 15px; }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #0369a1; border-radius: 50%; border-top-color: transparent; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card" id="authCard">
        <h2>Enter Portal ManumithaGP</h2>
        <div class="form-group">
            <label>Student Name / Access Handle</label>
            <input type="text" id="username" placeholder="Enter your name to open workspace">
        </div>
        <button class="btn" onclick="handleLogin()">Open My Study Workspace</button>
        <div class="status" id="authStatus"></div>
    </div>

    <div class="card" id="mainWorkspace" style="display: none;">
        <div class="user-meta">
            <span>Student: <span id="userDisplayName" style="font-weight:bold;color:#1e40af;"></span></span>
            <button class="logout-btn" onclick="handleLogout()">Exit Workspace</button>
        </div>
        <h2>Study-Guide Workspace</h2>
        <p>Upload exam papers. Small data fragments prevent timeouts and network drops.</p>
        
        <form id="uploadForm">
            <div class="upload-box" onclick="document.getElementById('fileInput').click()">
                <p style="font-size: 16px; margin: 0; font-weight: 500;">Drag & Drop files here or click to browse</p>
                <input type="file" id="fileInput" name="files" accept=".pdf,.docx,.jpg,.jpeg,.png" multiple style="display:none;" required>
                <div id="fileCount" style="color: #2563eb; margin-top: 12px; font-weight: bold;"></div>
            </div>
            <button type="submit" id="processBtn" class="btn">Process Batch</button>
        </form>
        <div class="status" id="statusMessage"></div>
        <div style="margin-top:25px; border-top:2px solid #e5e7eb; padding-top:20px;">
            <button class="btn" style="background: #10b981;" id="downloadBtn" onclick="triggerDownload()">Download Master Excel Study Guide</button>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/auth-status');
                if (res.ok) {
                    const data = await res.json();
                    if (data.logged_in) { showWorkspace(data.email); }
                }
            } catch (err) {}
        });

        function showWorkspace(name) {
            document.getElementById('authCard').style.display = "none";
            document.getElementById('mainWorkspace').style.display = "block";
            document.getElementById('userDisplayName').innerText = name;
        }

        async function handleLogin() {
            const username = document.getElementById('username').value;
            if (!username || !username.trim()) { alert("Please type your name."); return; }
            
            const authStatus = document.getElementById('authStatus');
            authStatus.style.display = "block";
            authStatus.className = "status info";
            authStatus.innerText = "Opening workspace connection... please wait.";

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username.trim() })
                });
                if (res.ok) { showWorkspace(username.trim()); } else {
                    authStatus.className = "status error";
                    authStatus.innerText = "Failed to launch account channel.";
                }
            } catch (err) {
                authStatus.className = "status error";
                authStatus.innerText = "Server connection failure.";
            }
        }

        async function handleLogout() {
            await fetch('/logout', { method: 'POST' });
            window.location.reload();
        }

        const fileInput = document.getElementById('fileInput');
        const fileCount = document.getElementById('fileCount');
        const status = document.getElementById('statusMessage');
        const processBtn = document.getElementById('processBtn');

        fileInput.addEventListener('change', () => {
            fileCount.innerText = `📁 ${fileInput.files.length} file(s) loaded.`;
        });

        // Helper function to upload files using tiny 1MB chunks
        async function uploadFileInChunks(file) {
            const chunkSize = 1024 * 1024; // 1 MB per fragment chunk
            const totalChunks = Math.ceil(file.size / chunkSize);
            const uploadId = Math.random().toString(36).substring(2) + Date.now().toString(36);

            for (let chunkIndex = 0; chunkIndex < totalChunks; chunkIndex++) {
                const start = chunkIndex * chunkSize;
                const end = Math.min(start + chunkSize, file.size);
                const chunk = file.slice(start, end);

                const formData = new FormData();
                formData.append('chunk', chunk);
                formData.append('filename', file.name);
                formData.append('upload_id', uploadId);
                formData.append('chunk_index', chunkIndex);
                formData.append('total_chunks', totalChunks);

                let attempt = 0;
                let success = false;
                while (attempt < 3 && !success) {
                    try {
                        let res = await fetch('/upload-chunk', { method: 'POST', body: formData });
                        if (res.ok) {
                            success = true;
                        } else {
                            attempt++;
                        }
                    } catch (err) {
                        attempt++;
                    }
                }
                if (!success) return false;
            }
            return true;
        }

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            status.style.display = "block";
            status.className = "status info";
            status.innerHTML = `<div class="spinner"></div>Streaming documents to backend in safe fragments...`;
            processBtn.disabled = true;

            const processedFiles = [];
            for (let file of fileInput.files) {
                status.innerHTML = `<div class="spinner"></div>Streaming: ${file.name}...`;
                let uploadSuccess = await uploadFileInChunks(file);
                if (uploadSuccess) {
                    processedFiles.push(file.name);
                } else {
                    status.className = "status error";
                    status.innerText = `❌ Connection drop during fragment transmission of ${file.name}.`;
                    processBtn.disabled = false;
                    return;
                }
            }

            try {
                // Inform the backend to begin background processing of the collected fragments
                const response = await fetch('/process-fragments', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filenames: processedFiles }) 
                });
                const data = await response.json();
                
                if (response.ok) {
                    status.className = "status success";
                    status.innerHTML = `⚙️ Files compiled perfectly! Cloud AI has started processing.<br>Please wait 20-30 seconds you need to wait long because of your tab , then click the download button below.`;
                    fileInput.value = ""; fileCount.innerText = "";
                } else {
                    status.className = "status error";
                    status.innerHTML = `❌ Error: ${data.detail}`;
                }
            } catch (err) {
                status.className = "status error";
                status.innerText = "❌ Connection reference lost.";
            } finally {
                processBtn.disabled = false;
            }
        });

        async function triggerDownload() {
            window.location.href = '/download';
        }
    </script>
</body>
</html>
